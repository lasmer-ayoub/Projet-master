# ===================================================================
# CONFIGURATION DE L'APPLICATION  -  masterproject
# ===================================================================

server.port=8080

# --- Base de donnees MySQL (XAMPP) ---
# createDatabaseIfNotExist=true : la base "masterproject" est creee automatiquement
spring.datasource.url=jdbc:mysql://localhost:3306/masterproject?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# update : Hibernate cree/met a jour les tables automatiquement a partir des entites
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ---
# La cle doit faire au moins 32 caracteres (256 bits) pour l'algorithme HS256
jwt.secret=masterproject-cle-secrete-tres-longue-a-changer-en-production-2026
# Duree de validite du token en millisecondes (86400000 = 24 heures)
jwt.expiration=86400000

# --- Compte administrateur cree automatiquement au premier demarrage ---
app.admin.email=admin@masterproject.com
app.admin.password=admin123
app.admin.nom=Administrateur
